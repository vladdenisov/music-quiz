werf:
  logLevel: info

requests:
  cpu: 200m
  memory: 128Mi

limits:
  cpu: 1000m
  memory: 512Mi

replicas:
  _default: 1

service:
  port: 3001
  targetServicePort: 3001

app:
  name: music-quiz
  env:
    NODE_ENV: production
    PORT: "3001"
    CORS_ORIGIN: "*"
    DEEZER_ENABLED: "true"
    ROUND_RESULT_DELAY_MS: "3000"

migrations:
  enabled: true
  image: ""
