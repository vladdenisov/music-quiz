services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: music_quiz
      POSTGRES_USER: music_quiz
      POSTGRES_PASSWORD: music_quiz
    ports:
      - "5492:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music_quiz -d music_quiz"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6399:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
